services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: flaps
      POSTGRES_PASSWORD: flaps
      POSTGRES_DB: flaps
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flaps"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - flaps-pgdata:/var/lib/postgresql/data

  flapsd:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://flaps:flaps@db:5432/flaps
      FLAPS_HMAC_PEPPER: dev-insecure-pepper-change-me
    entrypoint: ["sh", "-c"]
    command:
      - >
        printf 'database_url = "%s"\nbind_addr = "0.0.0.0:8080"\n' "$$DATABASE_URL"
        > /etc/flaps/flapsd.toml
        && exec /usr/local/bin/flapsd --config /etc/flaps/flapsd.toml
    ports:
      - "8080:8080"

volumes:
  flaps-pgdata:
