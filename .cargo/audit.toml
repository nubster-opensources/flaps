[advisories]
# RUSTSEC-2023-0071: rsa crate Marvin Attack timing side-channel.
# sqlx-mysql (which depends on rsa) is an optional dependency of sqlx that is
# never activated in this workspace: we use only the sqlite and postgres
# features. The crate appears in Cargo.lock because cargo resolves all
# optional deps at lock time regardless of activation. No rsa code is
# compiled or linked into any binary produced by this workspace.
ignore = ["RUSTSEC-2023-0071"]
