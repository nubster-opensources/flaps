name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  IMAGE_NAME: nubster/flaps

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    env:
      HAS_REGISTRY_CREDENTIALS: ${{ secrets.DOCKERHUB_PAT != '' }}
      REGISTRY_USERNAME: pierrickfonquerne
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive version from cargo metadata
        id: version
        run: |
          VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "flapsd") | .version')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to the image registry
        if: env.HAS_REGISTRY_CREDENTIALS == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Build (load)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: bash scripts/smoke-image.sh ${{ env.IMAGE_NAME }}:ci

      - name: Push (latest)
        if: env.HAS_REGISTRY_CREDENTIALS == 'true' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha

      - name: Push (release)
        if: env.HAS_REGISTRY_CREDENTIALS == 'true' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
