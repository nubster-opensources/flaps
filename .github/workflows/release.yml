name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # 1.88.0
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy
      - name: Check tag matches workspace version
        run: |
          VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "flaps-domain") | .version')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "tag=$GITHUB_REF_NAME workspace_version=$VERSION"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace version $VERSION; bump the version first"
            exit 1
          fi
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features --no-fail-fast
      - name: Packaging dry-run
        run: cargo xtask publish --dry-run

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # 1.88.0
        with:
          toolchain: 1.88.0
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo xtask publish
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="$(cargo xtask changelog-notes "$VERSION")"
          gh release create "$GITHUB_REF_NAME" --title "v$VERSION" --notes "$NOTES"
