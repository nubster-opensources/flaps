name: Fuzz

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/flaps-eval/**"
      - "fuzz/**"
      - "Cargo.lock"
      - ".github/workflows/fuzz.yml"
  push:
    branches: [main]
    paths:
      - "crates/flaps-eval/**"
      - "fuzz/**"
      - "Cargo.lock"
      - ".github/workflows/fuzz.yml"
  schedule:
    - cron: "41 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  flagset-parser:
    name: Fuzz flagd ruleset parser
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # 1.88.0 action
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: fuzz
          workspaces: "fuzz -> target"
      - run: cargo install --locked cargo-fuzz --version 0.13.2
      - name: Fast pull-request corpus
        if: github.event_name == 'pull_request'
        run: cargo fuzz run flagset_from_json -- -runs=10000 -max_len=65536
      - name: Extended main and scheduled corpus
        if: github.event_name != 'pull_request'
        run: cargo fuzz run flagset_from_json -- -max_total_time=300 -max_len=1048576
